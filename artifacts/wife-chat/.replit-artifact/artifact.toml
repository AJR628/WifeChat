kind = "web"
previewPath = "/"
title = "Wife Chat"
version = "1.0.0"
id = "artifacts/wife-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22997

[services.development]
run = "pnpm --filter @workspace/wife-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wife-chat", "run", "build" ]
publicDir = "artifacts/wife-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22997"
BASE_PATH = "/"
